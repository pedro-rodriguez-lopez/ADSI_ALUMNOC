# ===========================
# nginx.conf para UFV
# Multi-módulo: Profesores + Alumnos
# ===========================

events {
    worker_connections 1024;
}

http {

    # Upstream para profesores (balance entre ambas instancias)
    upstream profesores_app {
        server 10.1.1.10:3002 max_fails=3 fail_timeout=10s;
        server 10.1.1.11:3002 max_fails=3 fail_timeout=10s;
    }

    # Upstream para alumnos (balance entre ambas instancias)
    upstream alumnos_app {
        server 10.1.1.10:3001 max_fails=3 fail_timeout=10s;
        server 10.1.1.11:3001 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 80;
        server_name _;

        # ========== ARCHIVOS ESTÁTICOS ==========
        location /static/ {
            alias /var/www/public/;
            expires 1h;
            add_header Cache-Control "public, immutable";
        }

        # ========== LOCATION: /alumnos (ALUMNO C) ==========
        location /alumnos {
            proxy_pass http://alumnos_app;

            # Headers para la app
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Retry automático al siguiente backend si falla
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;

            # Opciones de timeout
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # ========== LOCATION: /profesores (ALUMNO D) ==========
        location /profesores {
            proxy_pass http://profesores_app;

            # Headers para la app
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Retry automático al siguiente backend si falla
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;

            # Opciones de timeout
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # ========== RAÍZ / ==========
        location / {
            root /var/www/public;
            try_files $uri $uri/ /index.html;
        }
    }
}
