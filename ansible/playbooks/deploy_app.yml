---
---
# =============================================================
# Playbook: deploy_app.yml
# Despliega nginx + web estáticos + servicios Node.js
# AlexPersonal: nginx + web
# AlexUFV: nginx + web + servicios Node.js (alumnos + profesores)
# =============================================================

# ── AlexPersonal: nginx + web estáticos ──────────────────────
- name: Desplegar nginx y web en AlexPersonal
  hosts: "linux_personal"
  gather_facts: yes

  vars:
    src_nginx_conf: "/usr/local/ufv/ufv-infra/ufv-app/nginx/AlexPersonal_nginx.conf"
    src_public:     "/usr/local/ufv/ufv-infra/ufv-app/public"
    dst_public:     "/var/www/public"
    dst_nginx_conf: "/etc/nginx/nginx.conf"

  tasks:
    - name: Actualizar sistema
      ansible.builtin.yum:
        name: '*'
        state: latest
      become: true

    - name: Instalar nginx
      ansible.builtin.yum:
        name: nginx
        state: present
      become: true

    - name: Crear directorio /var/www/public
      ansible.builtin.file:
        path: "{{ dst_public }}"
        state: directory
        owner: nginx
        group: nginx
        mode: '0755'
      become: true

    - name: Copiar nginx.conf (AlexPersonal)
      ansible.builtin.copy:
        src: "{{ src_nginx_conf }}"
        dest: "{{ dst_nginx_conf }}"
        owner: root
        group: root
        mode: '0644'
        backup: yes
      notify: reload nginx
      become: true

    - name: Copiar contenido web estático
      ansible.builtin.copy:
        src: "{{ src_public }}/"
        dest: "{{ dst_public }}/"
        owner: nginx
        group: nginx
        mode: '0644'
        directory_mode: '0755'
      notify: reload nginx
      become: true

    - name: Validar sintaxis nginx
      ansible.builtin.command:
        cmd: "nginx -t"
      become: true
      changed_when: false

    - name: Habilitar y arrancar nginx
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: yes
      become: true

  handlers:
    - name: reload nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
      become: true

# ── AlexUFV: nginx + web + Node.js services ──────────────────
- name: Desplegar nginx, web y servicios Node.js en AlexUFV
  hosts: linux_ufv
  gather_facts: yes

  vars:
    src_nginx_conf:      "/usr/local/ufv/ufv-infra/ufv-app/nginx/AlexUFV_nginx.conf"
    src_public:          "/usr/local/ufv/ufv-infra/ufv-app/public"
    dst_public:          "/var/www/public"
    dst_nginx_conf:      "/etc/nginx/nginx.conf"
    src_node_pkg:        "/usr/local/ufv/ufv-infra/ufv-app/node/package.json"
    src_node_alumnos:    "/usr/local/ufv/ufv-infra/ufv-app/node/alumno.js"
    src_node_profesores: "/usr/local/ufv/ufv-infra/ufv-app/node/profesores.js"
    dst_node_dir:        "/var/www/app"
    app_user:            "ec2-user"
    app_group:           "ec2-user"

  tasks:
    # ========== SISTEMA ==========
    - name: Actualizar sistema
      ansible.builtin.yum:
        name: '*'
        state: latest
      become: true

    - name: Instalar dependencias (nginx, Node.js, git)
      ansible.builtin.yum:
        name:
          - nginx
          - nodejs
          - npm
          - git
          - curl
        state: present
      become: true

    # ========== NGINX ==========
    - name: Crear directorio /var/www/public
      ansible.builtin.file:
        path: "{{ dst_public }}"
        state: directory
        owner: nginx
        group: nginx
        mode: '0755'
      become: true

    - name: Copiar nginx.conf (AlexUFV)
      ansible.builtin.copy:
        src: "{{ src_nginx_conf }}"
        dest: "{{ dst_nginx_conf }}"
        owner: root
        group: root
        mode: '0644'
        backup: yes
      notify: reload nginx
      become: true

    - name: Copiar contenido web estático
      ansible.builtin.copy:
        src: "{{ src_public }}/"
        dest: "{{ dst_public }}/"
        owner: nginx
        group: nginx
        mode: '0644'
        directory_mode: '0755'
      notify: reload nginx
      become: true

    - name: Validar sintaxis nginx
      ansible.builtin.command:
        cmd: "nginx -t"
      become: true
      changed_when: false

    - name: Habilitar y arrancar nginx
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: yes
      become: true

    # ========== NODE.JS - DIRECTORIO ==========
    - name: Crear directorio de aplicación Node.js
      ansible.builtin.file:
        path: "{{ dst_node_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: '0755'
      become: true

    - name: Copiar package.json
      ansible.builtin.copy:
        src: "{{ src_node_pkg }}"
        dest: "{{ dst_node_dir }}/package.json"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: '0644'
      become: true

    # ========== MÓDULO ALUMNOS (ALUMNO C) ==========
    - name: "⭐ Copiar alumno.js (módulo Alumnos - Alumno C)"
      ansible.builtin.copy:
        src: "{{ src_node_alumnos }}"
        dest: "{{ dst_node_dir }}/alumno.js"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: '0644'
      become: true
      notify: "restart alumnos service"
      register: alumno_copied

    - name: "⭐ Copiar profesores.js (módulo Profesores - Alumno D)"
      ansible.builtin.copy:
        src: "{{ src_node_profesores }}"
        dest: "{{ dst_node_dir }}/profesores.js"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: '0644'
      become: true
      notify: "restart profesores service"
      register: profesores_copied

    # ========== NPM INSTALL ==========
    - name: Instalar dependencias npm
      ansible.builtin.shell:
        cmd: "cd {{ dst_node_dir }} && npm install --production"
      register: npm_result
      changed_when: "'added' in npm_result.stdout or 'up to date' in npm_result.stdout"
      become_user: "{{ app_user }}"
      become: true

    # ========== SERVICIO ALUMNOS (ALUMNO C) ==========
    - name: "⭐ Crear servicio systemd para Alumnos (puerto 3001)"
      ansible.builtin.copy:
        dest: "/etc/systemd/system/ufvAlumnosService.service"
        content: |
          [Unit]
          Description=UFV Node.js Service - Alumnos (Módulo C)
          After=network.target
          Wants=ufvProfesoresService.service

          [Service]
          Type=simple
          User={{ app_user }}
          WorkingDirectory={{ dst_node_dir }}
          ExecStart=/usr/bin/node {{ dst_node_dir }}/alumno.js
          Restart=on-failure
          RestartSec=5
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=ufv-alumnos
          
          Environment="NODE_ENV=production"
          Environment="PORT=3001"
          Environment="DB_HOST=10.0.1.10"
          Environment="DB_USER=backend"
          Environment="DB_PASSWORD=ContraseñaSegura123"
          Environment="DB_NAME=academico"

          [Install]
          WantedBy=multi-user.target
        owner: root
        group: root
        mode: '0644'
      become: true
      notify: "reload systemd and restart alumnos service"

    # ========== SERVICIO PROFESORES (ALUMNO D) ==========
    - name: "⭐ Crear servicio systemd para Profesores (puerto 3002)"
      ansible.builtin.copy:
        dest: "/etc/systemd/system/ufvProfesoresService.service"
        content: |
          [Unit]
          Description=UFV Node.js Service - Profesores (Módulo D)
          After=network.target

          [Service]
          Type=simple
          User={{ app_user }}
          WorkingDirectory={{ dst_node_dir }}
          ExecStart=/usr/bin/node {{ dst_node_dir }}/profesores.js
          Restart=on-failure
          RestartSec=5
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=ufv-profesores
          
          Environment="NODE_ENV=production"
          Environment="PORT=3002"
          Environment="DB_HOST=10.0.1.10"
          Environment="DB_USER=backend"
          Environment="DB_PASSWORD=ContraseñaSegura123"
          Environment="DB_NAME=academico"

          [Install]
          WantedBy=multi-user.target
        owner: root
        group: root
        mode: '0644'
      become: true
      notify: "reload systemd and restart profesores service"

    # ========== SYSTEMD RELOAD Y START ==========
    - name: Recargar systemd daemon
      ansible.builtin.systemd:
        daemon_reload: yes
      become: true

    - name: "⭐ Habilitar y arrancar servicio Alumnos"
      ansible.builtin.systemd:
        name: ufvAlumnosService
        state: started
        enabled: yes
      become: true

    - name: "⭐ Habilitar y arrancar servicio Profesores"
      ansible.builtin.systemd:
        name: ufvProfesoresService
        state: started
        enabled: yes
      become: true

    # ========== VERIFICACIONES ==========
    - name: Esperar a que Alumnos esté listo
      ansible.builtin.wait_for:
        port: 3001
        delay: 2
        timeout: 15

    - name: Esperar a que Profesores esté listo
      ansible.builtin.wait_for:
        port: 3002
        delay: 2
        timeout: 15

    - name: " Verificar estado Alumnos"
      ansible.builtin.uri:
        url: "http://localhost:3001/health"
        method: GET
      register: alumnos_health
      changed_when: false

    - name: " Verificar estado Profesores"
      ansible.builtin.uri:
        url: "http://localhost:3002/health"
        method: GET
      register: profesores_health
      changed_when: false

    - name: " Mostrar resumen del despliegue"
      ansible.builtin.debug:
        msg: |
          DESPLIEGUE COMPLETADO EN {{ inventory_hostname }}
          
           Servicios:
            - Alumnos (Alumno C):     {{ ufvAlumnosService.status.ActiveState | default('unknown') }} en puerto 3001
            - Profesores (Alumno D):  {{ ufvProfesoresService.status.ActiveState | default('unknown') }} en puerto 3002
          
           URLs de acceso:
            - /alumnos        → http://{{ inventory_hostname }}/alumnos
            - /profesores     → http://{{ inventory_hostname }}/profesores
          
           Health checks:
            - Alumnos:    {{ alumnos_health.status }}
            - Profesores: {{ profesores_health.status }}

  handlers:
    - name: reload nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
      become: true

    - name: reload systemd and restart alumnos service
      block:
        - ansible.builtin.systemd:
            daemon_reload: yes
          become: true
        - ansible.builtin.systemd:
            name: ufvAlumnosService
            state: restarted
          become: true

    - name: reload systemd and restart profesores service
      block:
        - ansible.builtin.systemd:
            daemon_reload: yes
          become: true
        - ansible.builtin.systemd:
            name: ufvProfesoresService
            state: restarted
          become: true

    - name: "restart alumnos service"
      ansible.builtin.systemd:
        name: ufvAlumnosService
        state: restarted
      become: true

    - name: "restart profesores service"
      ansible.builtin.systemd:
        name: ufvProfesoresService
        state: restarted
      become: true